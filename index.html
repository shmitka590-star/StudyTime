<style>
*{box-sizing:border-box;font-family:'Nunito',sans-serif;margin:0;padding:0;}
body{min-height:100vh;background:linear-gradient(160deg,#fdf4ff 0%,#eff6ff 50%,#f0fdf4 100%);}
button{cursor:pointer;border:none;font-family:'Nunito',sans-serif;}
input{font-family:'Nunito',sans-serif;}
.screen{display:none;padding:16px;max-width:520px;margin:0 auto;}
.screen.active{display:block;}
@media(min-width:640px){.screen{padding:24px;max-width:600px;}}
#header{padding:12px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.92);border-bottom:3px solid #bfdbfe;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.pop{animation:pop 0.3s cubic-bezier(.36,.07,.19,.97) both;}
.float{animation:float 3s ease-in-out infinite;}
@keyframes pop{0%{transform:scale(0.6);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes star-rise{0%{transform:translate(-50%,-50%) scale(0.2);opacity:1}60%{transform:translate(-50%,-120%) scale(1.3);opacity:1}100%{transform:translate(-50%,-200%) scale(0.8);opacity:0}}
.star-burst{position:fixed;left:50%;top:50%;font-size:52px;pointer-events:none;z-index:9998;animation:star-rise 0.85s ease-out forwards;}
.bar-fill{transition:width 0.4s ease;}
.mcq-btn{width:100%;padding:13px 16px;font-size:15px;font-weight:700;border-radius:14px;margin-bottom:9px;text-align:left;border:2px solid #e2e8f0;background:#f8fafc;color:#1e293b;transition:all 0.12s;}
.mcq-btn:active{transform:scale(0.98);border-color:#7c3aed;background:#f5f3ff;}
.subject-card{border-radius:22px;padding:18px 20px;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:14px;box-shadow:0 6px 20px rgba(0,0,0,0.15);cursor:pointer;transition:transform 0.12s;}
.subject-card:active{transform:scale(0.98);}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:1000;overflow-y:auto;padding:16px;display:flex;align-items:flex-start;justify-content:center;}
.modal-box{background:#fff;border-radius:24px;padding:24px;width:100%;max-width:540px;margin-top:20px;}
.passage-box{background:#fef3c7;border-radius:16px;padding:16px;margin-bottom:14px;font-size:14px;line-height:1.75;color:#78350f;border-left:4px solid #f59e0b;}
.q-card{background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 4px 14px rgba(0,0,0,0.08);}
.q-text{font-size:17px;font-weight:700;color:#1e293b;margin-bottom:16px;line-height:1.5;}
</style>
</head>
<body>

<div id="header">
  <button onclick="goHome()" style="background:none;font-size:18px;font-weight:900;color:#7c3aed;">🏠 Study Time!</button>

    <span id="xp-display" style="font-size:13px;font-weight:800;color:#f59e0b;display:none;">⭐ 0 XP</span>
    <button onclick="openDashboard()" style="background:#f5f3ff;border:2px solid #e9d5ff;border-radius:10px;padding:5px 12px;font-size:13px;font-weight:800;color:#7c3aed;">👨‍👩‍👧‍👦 Parents</button>
  </div>
</div>

    </div>
  </div>
</div>

</div>

let state={child:null,subject:null,qIdx:0,xp:0,currentCtx:null};

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome(){
  state={child:null,subject:null,qIdx:0,xp:state.xp,currentCtx:null};
  show('screen-home');
  document.getElementById('xp-display').style.display='none';
}

function selectChild(c){
  state.child=c;
  state.xp=0;
  document.getElementById('xp-display').textContent='⭐ 0 XP';
  document.getElementById('xp-display').style.display='inline';
  renderChildScreen();
}

function selectSubject(s){
  state.subject=s;
  state.qIdx=0;
  state.currentCtx=null;
  renderTask();
}

function renderChildScreen(){
  const data=CUR[state.child];
  let html=`<div style="padding-top:16px;"><h2 style="font-size:22px;font-weight:900;color:#4c1d95;margin-bottom:6px;text-align:center;">Choose a subject</h2><p style="color:#7c3aed;font-size:14px;font-weight:700;margin-bottom:20px;text-align:center;">Complete all subjects to earn screen time! 🎮</p>`;
  for(let k in data){
    const sub=data[k];
    html+=`<div class="subject-card pop" style="background:${sub.color};" onclick="selectSubject('${k}')"><span style="font-size:38px;">${sub.emoji}</span><div style="flex:1;"><div style="font-size:20px;font-weight:900;">${sub.title}</div><div style="font-size:13px;opacity:0.85;">${sub.qs.length} questions · rising difficulty</div></div><span style="font-size:20px;opacity:0.8;">▶</span></div>`;
  }
  html+=`</div>`;
  document.getElementById('screen-child').innerHTML=html;
  show('screen-child');
}

function renderTask(){
  const sub=CUR[state.child][state.subject];
  const q=sub.qs[state.qIdx];
  const total=sub.qs.length;
  const pct=Math.round((state.qIdx/total)*100);
  if(q.ctx) state.currentCtx=q.ctx;
  let html=`<div style="padding-top:8px;"><div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;"><button onclick="renderChildScreen()" style="background:#f5f3ff;border:2px solid #e9d5ff;border-radius:10px;padding:6px 12px;font-size:13px;font-weight:800;color:#7c3aed;white-space:nowrap;">← Back</button><div style="flex:1;"><div style="display:flex;justify-content:space-between;font-size:12px;font-weight:800;color:#7c3aed;margin-bottom:4px;"><span>${sub.title}</span><span>${state.qIdx+1} / ${total}</span></div><div style="background:#e0e7ff;border-radius:12px;height:8px;overflow:hidden;"><div class="bar-fill" style="background:#7c3aed;height:100%;width:${pct}%;"></div></div></div></div>`;
  if(state.currentCtx){
    html+=`<div class="passage-box">📖 <b>Read this:</b><br><br>${state.currentCtx}</div>`;
  }
  if(q.t==='m'){
    html+=`<div class="q-card"><div class="q-text">${q.q}</div>`;
    q.o.forEach((opt,i)=>{
      html+=`<button class="mcq-btn" data-opt="${i}">${opt}</button>`;
    });
    html+=`</div>`;
  }else{
    html+=`<div class="q-card"><div class="q-text">${q.q}</div><input type="text" id="answer-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" style="width:100%;padding:14px;font-size:16px;border:2px solid #e2e8f0;border-radius:12px;margin-bottom:12px;" placeholder="Type your answer"><button style="width:100%;padding:14px;font-size:16px;font-weight:700;background:#7c3aed;color:#fff;border-radius:12px;" onclick="checkInputAnswer()">Submit ✓</button></div>`;
  }
  html+=`</div>`;
  document.getElementById('screen-task').innerHTML=html;
  show('screen-task');
  const inp=document.getElementById('answer-input');
  if(inp) setTimeout(()=>inp.focus(),80);
}

document.addEventListener('DOMContentLoaded',function(){
  document.getElementById('screen-task').addEventListener('click',function(e){
    const btn=e.target.closest('[data-opt]');
    if(!btn) return;
    const q=CUR[state.child][state.subject].qs[state.qIdx];
    const selected=q.o[parseInt(btn.dataset.opt)];
    if(selected===q.a){
      markCorrect();
    }else{
      btn.style.borderColor='#ef4444';
      btn.style.background='#fef2f2';
      setTimeout(()=>{btn.style.borderColor='#e2e8f0';btn.style.background='#f8fafc';},800);
      alert('Not quite – try again! 💪');
    }
  });
});

function checkInputAnswer(){
  const q=CUR[state.child][state.subject].qs[state.qIdx];
  const input=document.getElementById('answer-input').value.trim();
  if(input.toLowerCase()===q.a.toLowerCase()){
    markCorrect();
  }else{
    alert('Not quite – try again! 💪');
  }
}

function markCorrect(){
  state.xp+=10;
  document.getElementById('xp-display').textContent=`⭐ ${state.xp} XP`;
  showStarBurst();
  setTimeout(nextQuestion,800);
}

function nextQuestion(){
  const sub=CUR[state.child][state.subject];
  state.qIdx++;
  if(state.qIdx<sub.qs.length){
    renderTask();
  }else{
    showComplete();
  }
}

function showStarBurst(){
  const star=document.createElement('div');
  star.className='star-burst';
  star.textContent='⭐';
  document.getElementById('confetti-wrap').appendChild(star);
  setTimeout(()=>star.remove(),1000);
}

function showComplete(){
  const sub=CUR[state.child][state.subject];
  const earned=sub.qs.length*10;
  sendTelegramNotification(`🎉 <b>${state.child}</b> finished <b>${sub.title}</b>! Earned <b>${earned} XP</b>. Session total: ${state.xp} XP`);
  let html=`<div style="text-align:center;padding-top:40px;"><div class="pop" style="font-size:80px;margin-bottom:16px;">🎉</div><h2 style="font-size:26px;font-weight:900;color:#4c1d95;margin-bottom:8px;">Amazing work!</h2><p style="font-size:16px;color:#7c3aed;margin-bottom:8px;">You finished <b>${sub.title}</b>!</p><p style="font-size:14px;color:#9ca3af;margin-bottom:28px;">+${earned} XP earned this session</p><button style="width:100%;padding:14px;font-size:16px;font-weight:700;background:#7c3aed;color:#fff;border-radius:12px;margin-bottom:12px;" onclick="renderChildScreen()">Next Subject →</button><button style="width:100%;padding:14px;font-size:16px;font-weight:700;background:#f5f3ff;color:#7c3aed;border:2px solid #e9d5ff;border-radius:12px;" onclick="goHome()">Change Child</button></div>`;
  document.getElementById('screen-complete').innerHTML=html;
  show('screen-complete');
}

function sendTelegramNotification(msg){
  const token=localStorage.getItem('tg_token');
  const chat=localStorage.getItem('tg_chat');
  if(!token||!chat) return;
  fetch(`https://api.telegram.org/bot${token}/sendMessage`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:chat,text:msg,parse_mode:'HTML'})
  }).catch(()=>{});
}

function saveTelegramConfig(){
  const token=document.getElementById('tg-token').value.trim();
  const chat=document.getElementById('tg-chat').value.trim();
  if(!token||!chat){alert('Please fill in both fields.');return;}
  localStorage.setItem('tg_token',token);
  localStorage.setItem('tg_chat',chat);
  alert('Saved! Tap Test to confirm.');
}

function testTelegramNotification(){
  const token=document.getElementById('tg-token').value.trim()||localStorage.getItem('tg_token');
  const chat=document.getElementById('tg-chat').value.trim()||localStorage.getItem('tg_chat');
  if(!token||!chat){alert('Save your settings first.');return;}
  fetch(`https://api.telegram.org/bot${token}/sendMessage`,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({chat_id:chat,text:'✅ Study Time connected! You will be notified when your children complete their study subjects.',parse_mode:'HTML'})
  }).then(r=>r.json()).then(d=>{
    if(d.ok) alert('Test sent! Check your Telegram.');
    else alert('Error: '+d.description+'\n\nCheck your Bot Token and Chat ID.');
  }).catch(()=>alert('Network error.'));
}

function openDashboard(){
  const t=localStorage.getItem('tg_token')||'';
  const c=localStorage.getItem('tg_chat')||'';
  document.getElementById('dash-inner').innerHTML=`<h2 style="font-size:22px;font-weight:900;color:#4c1d95;margin-bottom:20px;">Parent Dashboard</h2><div style="background:#f5f3ff;border-radius:16px;padding:20px;margin-bottom:20px;"><div style="font-size:16px;font-weight:900;color:#4c1d95;margin-bottom:4px;">📱 Telegram Notifications</div><div style="font-size:13px;color:#6b7280;margin-bottom:14px;">Get notified when your child completes a subject.</div><div style="margin-bottom:8px;"><div style="font-size:12px;font-weight:800;color:#7c3aed;margin-bottom:4px;">BOT TOKEN</div><input id="tg-token" type="text" value="${t}" placeholder="123456789:ABCdef..." style="width:100%;padding:10px 12px;border:2px solid #e9d5ff;border-radius:10px;font-size:14px;"></div><div style="margin-bottom:12px;"><div style="font-size:12px;font-weight:800;color:#7c3aed;margin-bottom:4px;">CHAT ID</div><input id="tg-chat" type="text" value="${c}" placeholder="e.g. 123456789" style="width:100%;padding:10px 12px;border:2px solid #e9d5ff;border-radius:10px;font-size:14px;"></div><div style="display:flex;gap:8px;"><button onclick="saveTelegramConfig()" style="flex:1;padding:10px;background:#7c3aed;color:#fff;border-radius:10px;font-weight:800;font-size:14px;">💾 Save</button><button onclick="testTelegramNotification()" style="flex:1;padding:10px;background:#f0fdf4;color:#059669;border:2px solid #bbf7d0;border-radius:10px;font-weight:800;font-size:14px;">🔔 Test</button></div>${(t&&c)?'<div style="margin-top:10px;font-size:12px;color:#059669;font-weight:800;">✅ Telegram connected</div>':'<div style="margin-top:10px;font-size:12px;color:#9ca3af;font-weight:700;">Not yet configured</div>'}<details style="margin-top:14px;"><summary style="font-size:12px;font-weight:800;color:#7c3aed;cursor:pointer;">How to set this up ▼</summary><div style="font-size:12px;color:#4b5563;margin-top:8px;line-height:1.7;">1. Open Telegram → search <b>@BotFather</b><br>2. Send <b>/newbot</b> → follow prompts → copy the token<br>3. Search <b>@userinfobot</b> → send any message → copy your Chat ID<br>4. Paste both above → Save → Test</div></details></div><button style="width:100%;padding:12px;background:#e9d5ff;color:#4c1d95;border-radius:12px;font-weight:800;" onclick="closeDashboard()">Close</button>`;
  document.getElementById('modal-dashboard').style.display='flex';
}

function closeDashboard(){
  document.getElementById('modal-dashboard').style.display='none';
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
